<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Nkɔsoɔ Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f7f6f2;display:flex;align-items:center;justify-content:center;min-height:100vh;}
.card{background:#fff;border:0.5px solid #d6d4cc;border-radius:12px;padding:2rem;width:100%;max-width:360px;}
.logo{font-size:28px;margin-bottom:1rem;}
h2{font-size:18px;font-weight:500;margin-bottom:.25rem;color:#1a1a18;}
p{font-size:13px;color:#5F5E5A;margin-bottom:1.5rem;}
label{font-size:12px;color:#5F5E5A;display:block;margin-bottom:4px;}
input{width:100%;padding:10px 12px;border:0.5px solid #d6d4cc;border-radius:8px;font-size:14px;margin-bottom:1rem;outline:none;}
button{width:100%;padding:11px;border:none;border-radius:8px;background:#3B6D11;color:#fff;font-size:14px;font-weight:500;cursor:pointer;}
.error{background:#FCEBEB;color:#A32D2D;border-radius:8px;padding:8px 12px;font-size:13px;margin-bottom:1rem;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🌿</div>
  <h2>Nkɔsoɔ Admin</h2>
  <p>Enter your admin password to access the dashboard.</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <label>Password</label>
    <input type="password" name="password" placeholder="Admin password" autofocus/>
    <button type="submit">Sign in</button>
  </form>
</div>
</body>
</html>
